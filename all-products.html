<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Products - Aranmula Metal Mirror</title>
    <style>
* { margin:0; padding:0; box-sizing:border-box; font-family:"Poppins",sans-serif; }

body {
  background: linear-gradient(145deg, #000000, #d4af37);
  color:#fff; line-height:1.6; overflow-x:hidden; transition:filter 0.3s ease;
}

header {
  background-color: rgba(0,0,0,0.9);
  position: sticky; top:0; z-index:1000; padding:15px 30px;
  display:flex; justify-content:space-between; align-items:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}

header h1 { color:#d4af37; font-size:1.8rem; font-weight:700; }
nav a { color:#fff; margin-left:20px; text-decoration:none; transition:color 0.3s; }
nav a:hover { color:#ffd700; }

.section { padding:60px 20px; max-width:1200px; margin:auto; }
.section h2 { text-align:center; font-size:2.2rem; margin-bottom:40px; color:#ffd700; text-transform:uppercase; }

.products {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:30px;
}

.product {
  background-color: rgba(255,255,255,0.05); border-radius:15px;
  overflow:hidden; box-shadow:0 4px 15px rgba(0,0,0,0.6);
  transform: translateY(50px); opacity:0;
  transition: transform 0.6s ease, opacity 0.6s ease;
  position:relative; z-index:1; border: 2px solid #ffd700;
  cursor:pointer;
}

.product.visible { transform: translateY(0); opacity:1; }
.product img {
  width:100%; height:260px; object-fit:cover;
  border-bottom:3px solid #ffd700; transition:transform 0.4s ease, filter 0.4s ease;
  border-radius: 10px 10px 0 0;
}

.product:hover img { transform: scale(1.08); filter: brightness(1.2); }
.product:hover { transform: scale(1.02); border-color:#ffd700; }

.product-info { padding:20px; text-align:center; }
.product-info h3 { margin-bottom:10px; color:#ffd700; font-weight:600; font-size:1.2rem; }
.product-info p { color:#fff; margin-bottom:15px; font-size:1rem; }

.btn-add, .btn-buy {
  position: relative; overflow: hidden;
  padding:10px 20px; border-radius:5px; font-weight:600; margin:5px; display:inline-block; cursor:pointer; transition:0.3s;
}

.btn-add { background:#ffd700; color:#000; border:none; }
.btn-buy { background:#000; color:#ffd700; border:2px solid #ffd700; }

.btn-add::before, .btn-buy::before {
  content:""; position:absolute; top:0; left:-100%; width:100%; height:100%;
  transform: skewX(-25deg);
}

.btn-add::before { background: linear-gradient(120deg, rgba(255,255,255,0.6), rgba(255,255,255,0)); }
.btn-buy::before { background: linear-gradient(120deg, rgba(255,215,0,0.7), rgba(255,255,255,0)); }

.btn-add:hover::before { animation: shine 1s infinite; }
.btn-buy:hover::before { animation: buyShine 1s infinite; }

@keyframes shine { 0% { left:-100%; } 100% { left:200%; } }
@keyframes buyShine { 0% { left:-100%; } 100% { left:200%; } }

footer {
  background-color: rgba(0,0,0,0.9); color:#fff; text-align:center; padding:30px 0;
  margin-top:50px; border-top:1px solid #ffd700;
}

@keyframes pulse { 0% { box-shadow: 0 0 10px #ffd700; } 50% { box-shadow: 0 0 25px #ffd900; } 100% { box-shadow: 0 0 10px #ffd700; } }

.cart-icon {
  position: fixed; bottom:20px; right:20px;
  background-color:#ffd700; color:#000; border-radius:50%;
  width:60px; height:60px; display:flex; justify-content:center; align-items:center;
  font-size:1.6rem; box-shadow:0 4px 10px rgba(0,0,0,0.5);
  cursor:pointer; z-index:2000; transition:transform 0.3s ease, background-color 0.3s ease, opacity 0.3s;
  opacity:0; pointer-events:none;
}

.cart-icon.show { opacity:1; pointer-events:auto; animation: pulse 1.5s infinite; }
.cart-icon:hover { background-color:#e6c200; transform: scale(1.1); }
.cart-count { position:absolute; top:8px; right:10px; background-color:#000; color:#fff; font-size:0.8rem; font-weight:bold; border-radius:50%; padding:3px 7px; box-shadow:0 0 5px rgba(0,0,0,0.5); }

.lightbox { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display:flex; flex-direction:row; justify-content:center; align-items:center; opacity:0; visibility:hidden; transition: opacity 0.3s ease; z-index:10000; transform: scale(0.9); padding:20px; }
.lightbox.active { opacity:1; visibility:visible; transform: scale(1); }
.lightbox img { max-width:45%; max-height:80%; border-radius:10px; margin-right:30px; }
.lightbox .lightbox-info { display:flex; flex-direction:column; justify-content:center; color:#ffd700; max-width:45%; }
.lightbox .lightbox-info h3 { font-size:2rem; margin-bottom:15px; }
.lightbox .lightbox-info p { font-size:1.2rem; margin-bottom:15px; }
.lightbox .btn-buy { font-size:1.2rem; padding:12px 25px; margin-top:10px; align-self:flex-start; }
.lightbox .arrow { font-size:2rem; color:#ffd700; position:absolute; top:50%; transform:translateY(-50%); cursor:pointer; user-select:none; transition:0.3s; }
.lightbox .arrow:hover { color:#fff; }
.lightbox .left { left:20px; }
.lightbox .right { right:20px; }

@media(max-width:768px){
  header{ flex-direction:column; }
  nav a{ margin:10px 10px; }
  .lightbox { flex-direction:column; }
  .lightbox img, .lightbox .lightbox-info { max-width:90%; margin:10px 0; }
  .lightbox .arrow { font-size:1.5rem; }
}
</style>
  </head>
  <body>

    <div class="cart-icon" id="cartIcon" onclick="goToCart()">
      🛒
      <span class="cart-count" id="cartCount">0</span>
    </div>

    <header>
      <h1>Aranmula Metal Mirror</h1>
      <nav>
        <a href="hh.html">Home</a>
        <a href="#products">Products</a>
      </nav>
    </header>

    <section id="products" class="section">
      <h2>All Products</h2>
      <div class="products" id="productList"></div>
    </section>

    <footer>
      <p>&copy; 2025 Aranmula Metal Mirror | KARTHIK | All Rights Reserved</p>
    </footer>

    <div class="lightbox" id="lightbox">
      <span class="arrow left" onclick="prevProduct()">&#10094;</span>
      <img id="lightboxImg" src alt="Product">
      <div class="lightbox-info" id="lightboxInfo"></div>
      <button class="btn-buy" id="lightboxBuy">Buy Now</button>
      <span class="arrow right" onclick="nextProduct()">&#10095;</span>
    </div>

    <script>
// All products
const products = [
  { name: "Handheld Mirror", price: 2750, img: "pho1.jpg.jpg", desc:"Elegant handheld mirror with intricate Kerala craftsmanship." },
  { name: "Back Stand Mirror", price: 3200, img: "pho2.jpg", desc:"Classic back stand mirror for your bedroom or living space." },
  { name: "Fixed Stand Mirror", price: 3500, img: "pho3.jpg", desc:"Durable fixed stand mirror with traditional design." },
  { name: "Traditional Mirror", price: 3100, img: "pho4.jpg", desc:"Heritage-inspired mirror perfect for cultural decor." },
  { name: "Decorative Mirror", price: 4200, img: "pho5.jpg", desc:"Exquisite decorative mirror to enhance your interiors." },
  { name: "Luxury Mirror", price: 5000, img: "pho2.jpg", desc:"Premium luxury mirror with gold accents." }
];

const productList = document.getElementById("productList");
const cartCount = document.getElementById("cartCount");
const cartIcon = document.getElementById("cartIcon");
let cart = JSON.parse(localStorage.getItem("cart")) || [];
cartCount.innerText = cart.length;
if(cart.length > 0) cartIcon.classList.add("show");

let currentLightboxIndex = 0;

// Display all products
products.forEach((p,index)=>{
  const div=document.createElement("div");
  div.classList.add("product");
  div.innerHTML=`
    <img src="${p.img}" alt="${p.name}" onclick="openLightbox(${index})">
    <div class="product-info">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button class="btn-add" onclick="addToCart(${index})">Add to Cart</button>
      <button class="btn-buy" onclick="buyNow(${index})">Buy Now</button>
    </div>
  `;
  productList.appendChild(div);
});

// Cart functions
function addToCart(i){
  cart.push(products[i]);
  localStorage.setItem("cart", JSON.stringify(cart));
  cartCount.innerText = cart.length;
  cartIcon.classList.add("show");
  alert(products[i].name + " added to cart!");
}
function buyNow(i){ alert("Redirecting to payment for: " + products[i].name); }
function goToCart(){ window.location.href="cart.html"; }

// Scroll animation
const observer=new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{ if(entry.isIntersecting) entry.target.classList.add("visible"); });
},{ threshold:0.2 });
document.querySelectorAll('.product').forEach(p=>observer.observe(p));

// Lightbox
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
const lightboxInfo = document.getElementById("lightboxInfo");
const lightboxBuy = document.getElementById("lightboxBuy");

function openLightbox(index){
  currentLightboxIndex = index;
  updateLightbox();
  lightbox.classList.add("active");
}
function updateLightbox(){
  const p = products[currentLightboxIndex];
  lightboxImg.src = p.img;
  lightboxInfo.innerHTML = `<h3>${p.name}</h3><p>Price: ₹${p.price}</p><p>${p.desc}</p>`;
  lightboxBuy.onclick = ()=> buyNow(currentLightboxIndex);
}
function closeLightbox(){ lightbox.classList.remove("active"); }
function nextProduct(){ currentLightboxIndex = (currentLightboxIndex + 1) % products.length; updateLightbox(); }
function prevProduct(){ currentLightboxIndex = (currentLightboxIndex - 1 + products.length) % products.length; updateLightbox(); }

lightbox.addEventListener("click", function(e){ if(e.target === lightbox) closeLightbox(); });
document.addEventListener("keydown", function(e){ if(e.key === "Escape") closeLightbox(); });
</script>
  </body>
</html>
