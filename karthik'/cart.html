<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Cart | Aranmula Metal Mirror</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif;scroll-behavior:smooth;}
body{
  background:linear-gradient(145deg,#000000,#d4af37);
  color:#fff;line-height:1.6;overflow-x:hidden;
  opacity:0;transition:opacity .9s ease-in-out;
}
body.loaded{opacity:1;}
header{
  background-color:rgba(0,0,0,0.85);
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:14px 28px;display:flex;justify-content:space-between;align-items:center;
}
header h1{color:#d4af37;font-size:1.6rem;font-weight:800;}
nav a{color:#fff;text-decoration:none;margin-left:14px;font-weight:600;}
nav a:hover{color:#000;background:#ffd700;padding:6px 8px;border-radius:6px;}

.section{padding:100px 20px 60px;max-width:1100px;margin:auto;}
.section h2{text-align:center;font-size:2.1rem;margin-bottom:34px;color:#ffd700;}

.cart-container{
  display:flex;flex-direction:column;gap:20px;
  background:rgba(255,255,255,0.05);
  border-radius:14px;padding:20px;
}

.cart-item{
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,215,0,0.15);
  padding:10px 0;
}

.cart-item img{width:90px;height:90px;object-fit:cover;border-radius:8px;}
.cart-info{flex:1;margin-left:20px;}
.cart-info h3{color:#ffd700;}
.cart-actions button{
  background:#ffd700;color:#000;border:none;padding:8px 12px;
  border-radius:8px;font-weight:700;cursor:pointer;
}

.empty{text-align:center;color:#ffd700;padding:40px 0;}
.total{text-align:right;font-size:1.3rem;color:#ffd700;margin-top:18px;font-weight:700;}

.cart-buttons{text-align:right;margin-top:20px;}
.btn-clear,.btn-checkout{
  margin:6px;padding:10px 18px;border-radius:8px;font-weight:700;cursor:pointer;
}
.btn-clear{background:#000;color:#ffd700;border:2px solid #ffd700;}
.btn-checkout{background:#ffd700;color:#000;}

footer{background:#000;text-align:center;padding:28px 12px;margin-top:60px;}
</style>
</head>

<body>

<header>
  <h1>Aranmula Metal Mirror</h1>
  <nav>
    <a href="hh.html">Home</a>
    <a href="cart.html" style="color:#000;background:#ffd700;padding:6px 8px;border-radius:6px;">Cart</a>
  </nav>
</header>

<section class="section">
  <h2>Your Shopping Cart</h2>
  <div id="cartContainer" class="cart-container"></div>
  <div class="total" id="cartTotal"></div>

  <div class="cart-buttons">
    <button class="btn-clear" onclick="clearCart()">Clear Cart</button>
    <button class="btn-checkout" onclick="checkout()">Checkout</button>
  </div>
</section>

<footer>
  <p>&copy; 2025 Aranmula Metal Mirror | KARTHIK | All Rights Reserved</p>
</footer>

<script>
window.addEventListener('load',()=>document.body.classList.add('loaded'));

let cart = JSON.parse(localStorage.getItem('cart')||'[]');
const container=document.getElementById('cartContainer');
const totalEl=document.getElementById('cartTotal');

function renderCart(){
  container.innerHTML='';

  if(cart.length===0){
    container.innerHTML='<p class="empty">Your cart is empty.</p>';
    totalEl.textContent='';
    return;
  }

  let total=0;

  cart.forEach((item,index)=>{
    total+=item.price;

    const div=document.createElement('div');
    div.className='cart-item';

    div.innerHTML=`
      <img src="${item.img}" alt="${item.name}">
      <div class="cart-info">
        <h3>${item.name}</h3>
        <p>₹${item.price.toLocaleString('en-IN')}</p>
      </div>
      <div class="cart-actions">
        <button onclick="removeItem(${index})">Remove</button>
      </div>`;

    container.appendChild(div);
  });

  totalEl.textContent='Total: ₹'+total.toLocaleString('en-IN');
}

renderCart();

function removeItem(i){
  cart.splice(i,1);
  localStorage.setItem('cart',JSON.stringify(cart));
  renderCart();
}

function clearCart(){
  if(confirm('Clear all items from cart?')){
    cart=[];
    localStorage.setItem('cart',JSON.stringify(cart));
    renderCart();
  }
}

/* ✅ UPDATED CHECKOUT FUNCTION (WhatsApp Redirect) */
function checkout(){

  if(cart.length===0){
    alert('Your cart is empty!');
    return;
  }

  let message = "Hello, I want to order:\n\n";

  let total = 0;

  cart.forEach((item,index)=>{
    message += (index+1) + ". " + item.name + " - ₹" + item.price + "\n";
    total += item.price;
  });

  message += "\nTotal: ₹" + total;

  let encodedMessage = encodeURIComponent(message);

  let phone = "918281570199";

  let whatsappURL = "https://wa.me/" + phone + "?text=" + encodedMessage;

  window.open(whatsappURL, "_blank");
}
</script>

</body>
</html>
